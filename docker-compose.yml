services:
  fbif-sidebar-docgen:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-fbif-sidebar-docgen}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: ${CONTAINER_PORT:-3180}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_FBIF_APP_ID: ${FEISHU_FBIF_APP_ID:-}
      FEISHU_FBIF_APP_SECRET: ${FEISHU_FBIF_APP_SECRET:-}
      FEISHU_FUDE_APP_ID: ${FEISHU_FUDE_APP_ID:-}
      FEISHU_FUDE_APP_SECRET: ${FEISHU_FUDE_APP_SECRET:-}
      FEISHU_REDIRECT_BASE: ${FEISHU_REDIRECT_BASE:-}
      FEISHU_ALLOWED_TENANT_KEYS: ${FEISHU_ALLOWED_TENANT_KEYS:-}
      FEISHU_OAUTH_REDIRECT_URI: ${FEISHU_OAUTH_REDIRECT_URI:-}
      FEISHU_OAUTH_SCOPE: ${FEISHU_OAUTH_SCOPE:-contact:user.base:readonly}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-larkdocvar_session}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-}
      SESSION_MAX_AGE_SECONDS: ${SESSION_MAX_AGE_SECONDS:-604800}
      FRONTEND_POST_LOGIN_URL: ${FRONTEND_POST_LOGIN_URL:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/larkdocvar}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${HOST_PORT:-19094}:${CONTAINER_PORT:-3180}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${CONTAINER_PORT:-3180}/api/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-fbif-sidebar-docgen-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-larkdocvar}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15433}:5432"
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-larkdocvar}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

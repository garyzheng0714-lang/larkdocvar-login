services:
  fbif-sidebar-docgen:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-fbif-sidebar-docgen}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: ${CONTAINER_PORT:-3180}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_FBIF_APP_ID: ${FEISHU_FBIF_APP_ID:-}
      FEISHU_FBIF_APP_SECRET: ${FEISHU_FBIF_APP_SECRET:-}
      FEISHU_FUDE_APP_ID: ${FEISHU_FUDE_APP_ID:-}
      FEISHU_FUDE_APP_SECRET: ${FEISHU_FUDE_APP_SECRET:-}
      FEISHU_REDIRECT_BASE: ${FEISHU_REDIRECT_BASE:-}
      FEISHU_ALLOWED_TENANT_KEYS: ${FEISHU_ALLOWED_TENANT_KEYS:-}
      FEISHU_OAUTH_REDIRECT_URI: ${FEISHU_OAUTH_REDIRECT_URI:-}
      FEISHU_OAUTH_SCOPE: ${FEISHU_OAUTH_SCOPE:-contact:user.base:readonly}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-larkdocvar_session}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-}
      SESSION_MAX_AGE_SECONDS: ${SESSION_MAX_AGE_SECONDS:-604800}
      FRONTEND_POST_LOGIN_URL: ${FRONTEND_POST_LOGIN_URL:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-larkdocvar}
      # PDF 预览（output.includePdfPreview）依赖 Gotenberg(LibreOffice) 保真转换；默认指向下方编排的 gotenberg 服务
      GOTENBERG_URL: ${GOTENBERG_URL:-http://gotenberg:3000}
    depends_on:
      postgres:
        condition: service_healthy
      gotenberg:
        condition: service_started
    ports:
      - "127.0.0.1:${HOST_PORT:-19094}:${CONTAINER_PORT:-3180}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${CONTAINER_PORT:-3180}/api/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-fbif-sidebar-docgen-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-larkdocvar}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15433}:5432"
    volumes:
      - ${POSTGRES_DATA_DIR:-postgres_data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-larkdocvar}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Gotenberg = LibreOffice 无头转换微服务（MIT），把生成的 docx 转成保真 PDF 预览。
  # 仅供后端 convertDocxToPdfPreview 内部调用，不对宿主机开放端口（expose 仅在 compose 网络内可达）。
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: ${GOTENBERG_CONTAINER_NAME:-fbif-sidebar-docgen-gotenberg}
    restart: unless-stopped
    command:
      - gotenberg
      - --api-timeout=60s
    expose:
      - "3000"

volumes:
  postgres_data:
